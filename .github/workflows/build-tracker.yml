name: Coder Dashboard stats

# Bakes the OPTIONAL stats.json (true language bytes, commit counts, latest
# commit per repo). The dashboard works without this — it's pure enrichment.
# The token lives only here (Actions secret), never in the deployed page.

on:
  push:
    branches: [main]
    paths:
      - "config.js"
      - "build/**"
      - ".github/workflows/build-tracker.yml"
  schedule:
    - cron: "0 */6 * * *" # every 6 hours: refresh commit counts / language bytes
  workflow_dispatch: {}

permissions:
  contents: write # to commit stats.json back

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bake stats.json
        env:
          # Fine-grained PAT with read-only Contents + Metadata on your repos.
          # Add it under Settings → Secrets → Actions as TRACKER_TOKEN.
          # Optional: with no secret, the dashboard still works (live fetch).
          TRACKER_TOKEN: ${{ secrets.TRACKER_TOKEN }}
        run: |
          if [ -z "$TRACKER_TOKEN" ]; then
            echo "::notice::TRACKER_TOKEN secret not set — skipping optional stats bake."
            exit 0
          fi
          node build/fetch.cjs

      - name: Commit stats.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- stats.json; then
            git add stats.json
            git commit -m "chore: refresh dashboard stats [skip ci]"
            git push
          else
            echo "No changes to stats.json."
          fi
